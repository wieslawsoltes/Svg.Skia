name: Build

on:
  push:
    branches:
      - master
      - main
      - develop
      - 'feature/**'
      - 'release/**'
  pull_request:
    branches:
      - master
      - main
      - develop

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Determine version suffix
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "VERSION_SUFFIX=" >> $GITHUB_ENV
          else
            echo "VERSION_SUFFIX=-build.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore Svg.Skia.slnx

      - name: Build
        run: dotnet build Svg.Skia.slnx -c Release --no-restore -p:VersionSuffix="${{ env.VERSION_SUFFIX }}"

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Determine version suffix
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "VERSION_SUFFIX=" >> $GITHUB_ENV
          else
            echo "VERSION_SUFFIX=-build.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore Svg.Skia.slnx

      - name: Build
        run: dotnet build Svg.Skia.slnx -c Release --no-restore -p:VersionSuffix="${{ env.VERSION_SUFFIX }}"

      - name: Test
        run: dotnet test Svg.Skia.slnx -c Release --no-build --logger trx --results-directory artifacts/test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test/**/*.trx
          if-no-files-found: error
          retention-days: 7

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (${{ matrix.os }})
          path: artifacts/test/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

  build-maui:
    name: Build MAUI (macos-latest)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install .NET MAUI workload
        working-directory: src/SvgML.Maui
        run: dotnet workload install maui --ignore-failed-sources --skip-manifest-update

      - name: Determine version suffix
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "VERSION_SUFFIX=" >> $GITHUB_ENV
          else
            echo "VERSION_SUFFIX=-build.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Restore library
        working-directory: src/SvgML.Maui
        run: dotnet restore SvgML.Maui.csproj

      - name: Build library
        working-directory: src/SvgML.Maui
        run: dotnet build SvgML.Maui.csproj -c Release --no-restore -p:VersionSuffix="${{ env.VERSION_SUFFIX }}"

      - name: Build sample
        working-directory: src/SvgML.Maui
        run: dotnet build ../../samples/SvgML.Maui.Demo/SvgML.Maui.Demo.csproj -f net10.0-maccatalyst -c Release

  pack:
    name: Pack (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Determine version suffix
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "VERSION_SUFFIX=" >> $GITHUB_ENV
          else
            echo "VERSION_SUFFIX=-build.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore Svg.Skia.slnx

      - name: Pack
        run: dotnet pack Svg.Skia.slnx -c Release --no-restore -p:VersionSuffix="${{ env.VERSION_SUFFIX }}" -o artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-ubuntu-latest
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 30

  pack-maui:
    name: Pack MAUI (macos-latest)
    runs-on: macos-latest
    needs: build-maui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install .NET MAUI workload
        working-directory: src/SvgML.Maui
        run: dotnet workload install maui --ignore-failed-sources --skip-manifest-update

      - name: Determine version suffix
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "VERSION_SUFFIX=" >> $GITHUB_ENV
          else
            echo "VERSION_SUFFIX=-build.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Restore
        working-directory: src/SvgML.Maui
        run: dotnet restore SvgML.Maui.csproj

      - name: Pack
        working-directory: src/SvgML.Maui
        run: dotnet pack SvgML.Maui.csproj -c Release --no-restore -p:VersionSuffix="${{ env.VERSION_SUFFIX }}" -o ../../artifacts/maui-packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-maui-macos-latest
          path: |
            artifacts/maui-packages/*.nupkg
            artifacts/maui-packages/*.snupkg
          if-no-files-found: error
          retention-days: 30
